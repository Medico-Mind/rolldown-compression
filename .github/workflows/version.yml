name: Version

# Changesets-driven release flow:
# 1. PRs land on main carrying .changeset/*.md files.
# 2. The changesets action keeps a "chore: release" PR up to date (runs
#    `npm run version-packages`: bumps package.json + npm/* platform packages,
#    rewrites CHANGELOG.md, refreshes the lockfile).
# 3. Merging that PR re-runs this workflow with no pending changesets; the
#    action then runs `changeset tag`, pushes the release tag, and the release
#    workflow is invoked to build all platform binaries and publish to npm.
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  changesets:
    name: Changesets
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Create release PR or tag release
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npx changeset tag
          commit: 'chore: release'
          title: 'chore: release'
          # The GitHub release (with changelog notes) is created by the
          # release workflow after binaries are built and npm publish succeeded.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      publish: true
    secrets: inherit
