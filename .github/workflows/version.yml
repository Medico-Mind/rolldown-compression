name: Version

# Changesets-driven release flow:
# 1. PRs land on main carrying .changeset/*.md files.
# 2. The changesets action keeps a "chore: release" PR up to date (runs
#    `npm run version-packages`: bumps package.json + npm/* platform packages,
#    re-pins the root optionalDependencies to the new version
#    (scripts/sync-optional-deps.mjs), rewrites CHANGELOG.md, refreshes the
#    lockfile).
# 3. Merging that PR re-runs this workflow with no pending changesets; the
#    action then runs `changeset tag`, pushes the release tag, and the release
#    workflow is invoked to build all platform binaries and publish to npm.
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  changesets:
    name: Changesets
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Create release PR or tag release
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          # npm script (not bare `changeset tag`): the action execs the publish
          # command without a shell, and its own tag push has proven unreliable
          # (v0.3.0's tag never reached the remote, breaking the release
          # dispatch with "No ref found"), so the script pushes explicitly.
          publish: npm run tag-release
          commit: 'chore: release'
          title: 'chore: release'
          # The GitHub release (with changelog notes) is created by the
          # release workflow after binaries are built and npm publish succeeded.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dispatches release.yml on the freshly pushed release tag instead of
  # calling it as a reusable workflow: npm Trusted Publishing validates the
  # top-level workflow's filename, so release.yml must be the entry point of
  # every publishing run. workflow_dispatch is exempt from GitHub's
  # GITHUB_TOKEN recursion prevention, so the plain job token suffices.
  release:
    name: Trigger release
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHED_PACKAGES: ${{ needs.changesets.outputs.publishedPackages }}
        run: |
          VERSION="$(jq -r '.[] | select(.name == "@medicomind/rolldown-compression") | .version' <<< "$PUBLISHED_PACKAGES")"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine published version from: $PUBLISHED_PACKAGES"
            exit 1
          fi
          gh workflow run release.yml --repo "$GITHUB_REPOSITORY" \
            --ref "@medicomind/rolldown-compression@${VERSION}" \
            -f publish=true
