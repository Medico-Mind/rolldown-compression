name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run lint
      # optionalDependencies must NOT be checked in — they are injected at
      # publish time (see scripts/sync-optional-deps.mjs for why).
      - run: node scripts/sync-optional-deps.mjs --check
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04-arm covers aarch64 linux natively (no QEMU), matching
        # the aarch64-unknown-linux-gnu release target.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: cargo test
      - run: npm run build
      - run: npm run typecheck
      - run: npm run test:coverage

  test-wasm:
    name: Test (wasm32-wasip1-threads fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-wasip1-threads
      # clang toolchain for zstd-sys's C sources; napi build picks it up
      # through WASI_SDK_PATH.
      - name: Install wasi-sdk
        run: |
          curl -fsSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/wasi-sdk-29.0-x86_64-linux.tar.gz | tar -xz -C "$RUNNER_TEMP"
          echo "WASI_SDK_PATH=$RUNNER_TEMP/wasi-sdk-29.0-x86_64-linux" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npx napi build --platform --release --target wasm32-wasip1-threads
      # 'error' forbids the silent fallback to a native .node, proving the
      # wasm binding itself loads and compresses.
      - name: Smoke test wasm binding
        run: NAPI_RS_FORCE_WASI=error node scripts/wasm-smoke.mjs
      # The full suite runs with 'true' (prefer wasm, keep native when a
      # package has no wasm binding): rolldown itself is napi-rs based and
      # ships no wasm package here, so 'error' would break its loader. The
      # smoke test above already guarantees our binding is the wasm one.
      - name: Run tests against wasm binding
        run: npm test
        env:
          NAPI_RS_FORCE_WASI: 'true'

  benchmark:
    name: Benchmark (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add llvm-tools
      # --c-pgo needs a clang whose major matches the LLVM inside rustc, so
      # the instrumented C and Rust code share one profiling runtime and
      # raw profile format (see release.yml). Ubuntu's clang usually lags
      # rustc's LLVM, so install the matching major from apt.llvm.org; if it
      # isn't published there yet, fall back to the distro clang and let
      # build.mjs downgrade to Rust-only PGO.
      - name: Install clang matching rustc LLVM (C PGO)
        run: |
          MAJOR="$(rustc -vV | sed -n 's/^LLVM version: \([0-9]*\).*/\1/p')"
          if wget -qO "$RUNNER_TEMP/llvm.sh" https://apt.llvm.org/llvm.sh && sudo bash "$RUNNER_TEMP/llvm.sh" "$MAJOR"; then
            CLANG="clang-$MAJOR"
          else
            echo "::warning::clang-$MAJOR unavailable from apt.llvm.org; using distro clang (C PGO may be skipped)"
            CLANG=clang
          fi
          "$CLANG" --version
          {
            echo "CC=$CLANG"
            echo "CXX=${CLANG/clang/clang++}"
          } >> "$GITHUB_ENV"
      # Unversioned llvm-bolt + merge-fdata binaries, which is what
      # scripts/pgo/build.mjs probes for on PATH — without them the BOLT
      # pass is silently skipped and the benchmark would measure a PGO-only
      # binding instead of the PGO+BOLT binary that ships for x64-linux-gnu.
      # libbolt-dev provides the instrumentation runtime (libbolt_rt_instr.a)
      # that `llvm-bolt -instrument` links into the binding — but it installs
      # under the versioned prefix (/usr/lib/llvm-NN/lib/), while the
      # unversioned /usr/bin/llvm-bolt resolves the runtime relative to
      # itself, i.e. /usr/lib/ — so link the libraries over there.
      - name: Install llvm-bolt (BOLT post-link pass)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm-bolt libbolt-dev
          for lib in /usr/lib/llvm-*/lib/libbolt_rt_*.a; do
            sudo ln -sf "$lib" "/usr/lib/$(basename "$lib")"
          done
      - run: npm ci
      - run: npm run build:pgo -- --c-pgo
      - name: Run node benchmark
        run: |
          echo '## Benchmark results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          node benchmark/index.mjs | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Run PGO benchmark
        run: |
          echo '## Benchmark results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          node benchmark/pgo-compare.mjs | tee -a "$GITHUB_STEP_SUMMARY"
