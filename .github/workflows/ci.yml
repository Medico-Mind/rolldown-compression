name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run lint
      # optionalDependencies must NOT be checked in — they are injected at
      # publish time (see scripts/sync-optional-deps.mjs for why).
      - run: node scripts/sync-optional-deps.mjs --check
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: cargo test
      - run: npm run build
      - run: npm run typecheck
      - run: npm run test:coverage

  benchmark:
    name: Benchmark (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run build
      - name: Run benchmark
        run: |
          echo '## Benchmark results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          node benchmark/index.mjs | tee -a "$GITHUB_STEP_SUMMARY"
