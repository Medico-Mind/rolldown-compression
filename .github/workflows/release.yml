name: Release

# Invoked in one of three ways:
# - workflow_call from version.yml after the changesets release PR is merged
#   (publish: true) — builds all platform binaries and publishes to npm;
# - workflow_dispatch — dry-run: builds all artifacts, publishes nothing;
# - push of a release tag (manual escape hatch, e.g. re-running a failed
#   publish for an already-tagged version).
on:
  push:
    tags:
      - 'v*'
      - '@medicomind/rolldown-compression@*'
  workflow_dispatch:
  workflow_call:
    inputs:
      publish:
        description: Publish the built artifacts to npm
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build:native -- --target aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build:native -- --target x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: npm run build:native -- --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: npm run build:native -- --target aarch64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: npm run build:native -- --target x86_64-unknown-linux-musl
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build:native -- --target x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}
      - run: npm ci
      - name: Build in docker
        uses: addnab/docker-run-action@v3
        if: ${{ matrix.settings.docker }}
        with:
          image: ${{ matrix.settings.docker }}
          options: --user 0:0 -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db -v ${{ github.workspace }}/.cargo-cache/registry/cache:/usr/local/cargo/registry/cache -v ${{ github.workspace }}/.cargo-cache/registry/index:/usr/local/cargo/registry/index -v ${{ github.workspace }}:/build -w /build
          run: ${{ matrix.settings.build }}
      - name: Build
        if: ${{ !matrix.settings.docker }}
        run: ${{ matrix.settings.build }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: '*.node'
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build:ts
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move artifacts into platform packages
        run: npx napi artifacts --output-dir artifacts
      - name: List packages
        run: ls -R npm
      - name: Publish to npm
        if: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
        run: |
          npm config set provenance true
          npx napi prepublish -t npm --no-gh-release
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        if: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="@medicomind/rolldown-compression@${VERSION}"
          gh release create "$TAG" --title "$TAG" --notes-from-tag --verify-tag || \
            gh release create "$TAG" --title "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dry-run pack (no publish)
        if: ${{ inputs.publish != true && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          npx napi prepublish -t npm --dry-run --no-gh-release
          npm pack --dry-run
