name: Release

# Invoked in one of three ways:
# - workflow_call from version.yml after the changesets release PR is merged
#   (publish: true) — builds all platform binaries and publishes to npm;
# - workflow_dispatch — dry-run by default: builds all artifacts, publishes
#   nothing; set publish=true to re-run a failed publish (already-published
#   packages are skipped, so this is safe to repeat);
# - push of a release tag (manual escape hatch, e.g. re-running a failed
#   publish for an already-tagged version).
on:
  push:
    tags:
      - 'v*'
      - '@medicomind/rolldown-compression@*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built artifacts to npm
        type: boolean
        default: false
  workflow_call:
    inputs:
      publish:
        description: Publish the built artifacts to npm
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build:native -- --target aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build:native -- --target x86_64-apple-darwin
          # linux gnu targets cross-compile with the napi-rs toolchain
          # (@napi-rs/cross-toolchain, cached under ~/.napi-rs).
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build:native -- --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npm run build:native -- --target aarch64-unknown-linux-gnu --use-napi-cross
          # musl cross-compiles with zig (-x).
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npm run build:native -- --target x86_64-unknown-linux-musl -x
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build:native -- --target x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}
      - name: Cache napi-rs cross toolchain
        if: ${{ contains(matrix.settings.build, '--use-napi-cross') }}
        uses: actions/cache@v4
        with:
          path: ~/.napi-rs
          key: napi-cross-${{ matrix.settings.target }}
      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.14.1
      - name: Install cargo-zigbuild
        if: ${{ contains(matrix.settings.target, 'musl') }}
        uses: taiki-e/install-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild
      - run: npm ci
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: '*.node'
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build:ts
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move artifacts into platform packages
        run: npx napi artifacts --output-dir artifacts
      - name: List packages
        run: ls -R npm
      # Publishes every platform package plus the root package, one by one.
      # Idempotent (already-published versions are skipped) and retried,
      # because GitHub's OIDC endpoint used for provenance intermittently
      # fails with IDENTITY_TOKEN_READ_ERROR when several packages are
      # published in quick succession. --ignore-scripts keeps the root
      # package's prepublishOnly (napi prepublish) from re-publishing the
      # platform packages a second time.
      - name: Publish to npm
        if: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
        run: |
          npm config set provenance true
          for dir in npm/* .; do
            name="$(node -p "require('./${dir}/package.json').name")"
            version="$(node -p "require('./${dir}/package.json').version")"
            if [ -n "$(npm view "${name}@${version}" version 2>/dev/null || true)" ]; then
              echo "${name}@${version} already published, skipping"
              continue
            fi
            for attempt in 1 2 3; do
              # ./ prefix keeps npm from parsing npm/darwin-arm64 as a
              # github owner/repo spec
              if npm publish "./${dir}" --access public --ignore-scripts; then
                continue 2
              fi
              echo "::warning::Publishing ${name}@${version} failed (attempt ${attempt}/3)"
              sleep 15
            done
            echo "::error::Failed to publish ${name}@${version} after 3 attempts"
            exit 1
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        if: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="@medicomind/rolldown-compression@${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --notes-from-tag --verify-tag || \
            gh release create "$TAG" --title "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dry-run pack (no publish)
        if: ${{ inputs.publish != true && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          npx napi prepublish -t npm --dry-run --no-gh-release
          npm pack --dry-run
