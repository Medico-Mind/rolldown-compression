name: Release

# Invoked in one of three ways:
# - workflow_dispatch from version.yml after the changesets release PR is
#   merged (publish: true) — builds all platform binaries and publishes to
#   npm. Dispatch (not workflow_call) because npm Trusted Publishing
#   validates the top-level workflow's filename, so release.yml must be the
#   entry point of every publishing run;
# - manual workflow_dispatch — dry-run by default: builds all artifacts,
#   publishes nothing; set publish=true to re-run a failed publish
#   (already-published packages are skipped, so this is safe to repeat);
# - push of a release tag (manual escape hatch, e.g. re-running a failed
#   publish for an already-tagged version).
on:
  push:
    tags:
      - 'v*'
      - '@medicomind/rolldown-compression@*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built artifacts to npm
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        # Every target builds with PGO (scripts/pgo/build.mjs): instrumented
        # build -> training run -> llvm-profdata merge -> optimized rebuild.
        # The instrumented binding has to execute to produce profiles, so
        # cross-compiled targets train through an emulation layer:
        # - x86_64-apple-darwin: x64 Node under Rosetta 2 (nodeArch: x64);
        # - aarch64-unknown-linux-gnu: arm64 Node container under QEMU;
        # - x86_64-unknown-linux-musl: entire PGO pipeline runs natively in
        #   an Alpine container (zig cc can't link instrumented builds: it
        #   rejects rustc's `-u __llvm_profile_runtime` flag);
        # docker commands mount the workspace at its host path so the
        # binding path and LLVM_PROFILE_FILE resolve unchanged inside.
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            build: >-
              node scripts/pgo/build.mjs --skip-baseline --no-bolt
              --napi-args="--target aarch64-apple-darwin"
          - host: macos-latest
            target: x86_64-apple-darwin
            nodeArch: x64
            build: >-
              node scripts/pgo/build.mjs --skip-baseline --no-bolt
              --napi-args="--target x86_64-apple-darwin"
          # linux gnu targets cross-compile with the napi-rs toolchain
          # (@napi-rs/cross-toolchain, cached under ~/.napi-rs).
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: >-
              node scripts/pgo/build.mjs --skip-baseline --no-bolt
              --napi-args="--target x86_64-unknown-linux-gnu --use-napi-cross"
          # TARGET_CC/TARGET_CXX=clang: the napi-cross gcc is 4.8.5
          # (manylinux2014), which rejects libmimalloc-sys's unconditional
          # -Wno-error=date-time (-Wdate-time needs gcc >= 4.9). With clang in
          # TARGET_CC the napi CLI keeps it and adds the cross sysroot to
          # TARGET_CFLAGS, so C sources build with the runner's clang against
          # the glibc 2.17 sysroot while linking stays on the cross gcc. The
          # x64-gnu job doesn't need this: host == target there, so cc-rs
          # ignores TARGET_CC and uses the modern host compiler.
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: >-
              TARGET_CC=clang TARGET_CXX=clang++
              node scripts/pgo/build.mjs --skip-baseline --no-bolt
              --napi-args="--target aarch64-unknown-linux-gnu --use-napi-cross"
              --train="docker run --rm --platform linux/arm64 -v $PWD:$PWD -w $PWD -e LLVM_PROFILE_FILE node:26-slim node scripts/pgo/train.mjs {binding}"
          # musl builds (and trains) natively inside an Alpine container, so
          # no --train override is needed. rust:alpine + apk nodejs rather
          # than the napi-rs image, whose lts-alpine tag lags on Node 18
          # (too old for @napi-rs/cli). build-base provides the C toolchain
          # for zstd-sys, llvm-tools provides llvm-profdata.
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: >-
              docker run --rm -v $PWD:$PWD -w $PWD -e CARGO_TERM_COLOR
              rust:alpine
              sh -c 'apk add --no-cache nodejs npm build-base &&
              rustup component add llvm-tools &&
              node scripts/pgo/build.mjs --skip-baseline --no-bolt
              --napi-args="--target x86_64-unknown-linux-musl"'
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: >-
              node scripts/pgo/build.mjs --skip-baseline --no-bolt
              --napi-args="--target x86_64-pc-windows-msvc"
          # wasm fallback for platforms without a prebuilt native binding
          # (published as @medicomind/rolldown-compression-wasm32-wasi and
          # loaded by index.js when every native require fails). Plain
          # release build — the PGO pipeline doesn't apply to wasm. wasi-sdk
          # provides the clang toolchain for zstd-sys's C sources; napi
          # build picks it up through WASI_SDK_PATH. The smoke test loads
          # the wasm binding under Node and runs one real compression batch,
          # exercising the threaded (rayon) path end to end.
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
            build: |
              curl -fsSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/wasi-sdk-29.0-x86_64-linux.tar.gz | tar -xz -C "$RUNNER_TEMP"
              export WASI_SDK_PATH="$RUNNER_TEMP/wasi-sdk-29.0-x86_64-linux"
              npx napi build --platform --release --target wasm32-wasip1-threads
              NAPI_RS_FORCE_WASI=error node scripts/wasm-smoke.mjs
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          # x64 Node on the arm64 macOS runner (Rosetta 2) so the training run
          # can load the cross-compiled x86_64-apple-darwin binding.
          architecture: ${{ matrix.settings.nodeArch || '' }}
      # musl needs no host Rust: it builds inside the Alpine container, which
      # would also leave root-owned files in target/ that break the cache
      # post step.
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !contains(matrix.settings.target, 'musl') }}
        with:
          targets: ${{ matrix.settings.target }}
          # llvm-profdata for merging PGO profiles (scripts/pgo/build.mjs)
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        if: ${{ !contains(matrix.settings.target, 'musl') }}
        with:
          key: ${{ matrix.settings.target }}
      - name: Cache napi-rs cross toolchain
        if: ${{ contains(matrix.settings.build, '--use-napi-cross') }}
        uses: actions/cache@v4
        with:
          path: ~/.napi-rs
          key: napi-cross-${{ matrix.settings.target }}
      - name: Set up QEMU (arm64 PGO training container)
        if: ${{ contains(matrix.settings.build, 'linux/arm64') }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - run: npm ci
      - name: Build (PGO)
        run: ${{ matrix.settings.build }}
        shell: bash
      # Native targets produce one *.node file; the wasm target produces the
      # *.wasm binary plus the JS glue (loader, browser entry, workers) that
      # `napi artifacts --build-output-dir` copies into npm/wasm32-wasi at
      # publish time. The debug wasm build is excluded — it is never
      # published.
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            *.wasm
            !*.debug.wasm
            *.wasi.cjs
            *.wasi-browser.js
            wasi-worker*.mjs
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      # No registry-url / auth token: publishing authenticates via npm
      # Trusted Publishing (OIDC, needs the id-token: write permission and
      # npm CLI >= 11.5.1, bundled with Node 26). Provenance is generated
      # automatically. Each package (root + npm/*) must have this repo's
      # release.yml configured as its trusted publisher on npmjs.com.
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run build:ts
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      # --build-output-dir points at the wasm bindings artifact: napi
      # artifacts collects *.node/*.wasm recursively from --output-dir, but
      # reads the wasm JS glue files from the build output dir.
      - name: Move artifacts into platform packages
        run: >-
          npx napi artifacts --output-dir artifacts
          --build-output-dir artifacts/bindings-wasm32-wasip1-threads
      - name: List packages
        run: ls -R npm
      # The published root package must declare every npm/* platform package
      # in optionalDependencies — publishing runs with --ignore-scripts, so
      # `napi prepublish` never writes them (0.3.1 shipped without any and
      # the native binding was never installed). They are injected here, at
      # publish time only: checked into package.json they would break every
      # `npm ci` after a version bump, because the new version's platform
      # packages aren't on the registry yet when the lockfile is refreshed.
      - name: Inject optionalDependencies (platform packages)
        run: node scripts/sync-optional-deps.mjs
      # Publishes every platform package plus the root package, one by one.
      # Idempotent (already-published versions are skipped) and retried,
      # because GitHub's OIDC endpoint intermittently fails with
      # IDENTITY_TOKEN_READ_ERROR when several packages are published in
      # quick succession. --ignore-scripts keeps the root package's
      # prepublishOnly (napi prepublish) from re-publishing the platform
      # packages a second time.
      - name: Publish to npm
        if: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
        run: |
          for dir in npm/* .; do
            name="$(node -p "require('./${dir}/package.json').name")"
            version="$(node -p "require('./${dir}/package.json').version")"
            if [ -n "$(npm view "${name}@${version}" version 2>/dev/null || true)" ]; then
              echo "${name}@${version} already published, skipping"
              continue
            fi
            for attempt in 1 2 3; do
              # ./ prefix keeps npm from parsing npm/darwin-arm64 as a
              # github owner/repo spec
              if npm publish "./${dir}" --access public --ignore-scripts; then
                continue 2
              fi
              echo "::warning::Publishing ${name}@${version} failed (attempt ${attempt}/3)"
              sleep 15
            done
            echo "::error::Failed to publish ${name}@${version} after 3 attempts"
            exit 1
          done
      - name: Create GitHub release
        if: ${{ inputs.publish == true || startsWith(github.ref, 'refs/tags/') }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --notes-from-tag --verify-tag || \
            gh release create "$TAG" --title "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dry-run pack (no publish)
        if: ${{ inputs.publish != true && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          npx napi prepublish -t npm --dry-run --no-gh-release
          npm pack --dry-run
